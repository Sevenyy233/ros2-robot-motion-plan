# ============================================================
# 公共参数 — 所有加载此 YAML 的节点都会继承
# ============================================================
/**:
  ros__parameters:
    map_frame: "map"
    base_frame: "base_link"

# ============================================================
# local_path_planner — Pure Pursuit 局部规划器
# ============================================================
local_path_planner:
  ros__parameters:
    layer_name: "elevation"
    max_elevation: 1.0
    max_slope_angle: 45.0

    # --- Pure Pursuit ---
    lookahead_min: 0.3
    lookahead_max: 2.0
    lookahead_scale: 0.3
    wheel_base: 0.3

    # --- 速度约束 ---
    max_linear_speed: 0.5
    max_angular_speed: 1.0

    # --- 目标 / 控制 ---
    goal_tolerance: 0.15
    control_rate: 20.0

    # --- 局部路径发布 ---
    local_path_lookahead: 3.0

# ============================================================
# 示例：新规划器节点（取消注释即可使用）
