# ============================================================
# 公共参数 — 所有加载此 YAML 的节点都会继承
# ============================================================
/**:
  ros__parameters:
    map_frame: "map"
    base_frame: "base_link"

# ============================================================
# global_path_planner — 3D A* 全局路径规划器
# ============================================================
global_path_planner:
  ros__parameters:
    layer_name: "elevation"
    slope_layer_name: "slope"
    traversability_layer_name: "traversability"
    max_elevation: 1.0
    max_slope_angle: 45.0
    treat_nan_as_obstacle: True
    use_tf_for_start: True
    path_z_offset: 0.05
    replan_period: 2.0  # 全局重规划周期(秒)
    goal_tolerance: 0.5 # 目标点到达容差(米)
    robot_radius: 3.0   # 机器人半径(米)

# ============================================================
# 示例：新规划器节点（取消注释即可使用）
